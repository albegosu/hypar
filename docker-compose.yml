services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    profiles: ["full", "api", "all"]

  # Ollama for local embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull models on startup
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5
        ollama pull ${OLLAMA_MODEL:-nomic-embed-text}
        ollama pull ${OLLAMA_LLM_MODEL:-tinyllama}
        tail -f /dev/null
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - rag-network
    profiles: ["full", "api", "all"]

  # Backend API (NestJS)
  backend:
    build:
      context: ./rag-api
      dockerfile: Dockerfile
    container_name: rag-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag_password}@postgres:5432/${POSTGRES_DB:-rag_db}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-nomic-embed-text}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-tinyllama}
      OLLAMA_CHAT_TIMEOUT_MS: ${OLLAMA_CHAT_TIMEOUT_MS:-180000}
      OLLAMA_PLANNER_TIMEOUT_MS: ${OLLAMA_PLANNER_TIMEOUT_MS:-60000}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - rag-network
    restart: unless-stopped
    profiles: ["full", "api", "all"]

  # Frontend (Nuxt 3)
  frontend:
    build:
      context: ./rag-ui
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-3001}
    container_name: rag-frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-3001}
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - rag-network
    restart: unless-stopped
    profiles: ["full", "all"]

  # Learning playground (Nuxt + @rag/learning)
  playground:
    build:
      context: .
      dockerfile: ./packages/rag-playground/Dockerfile
    container_name: rag-playground
    environment:
      HOST: 0.0.0.0
      PORT: 3002
    ports:
      - "${PLAYGROUND_PORT:-3002}:3002"
    networks:
      - rag-network
    restart: unless-stopped
    profiles: ["learning", "all"]

volumes:
  postgres_data:
  ollama_data:
  backend_uploads:

networks:
  rag-network:
    driver: bridge
