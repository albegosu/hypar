# Dependabot version updates: disabled via `ignore` on each entry (remove those blocks to re-enable).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - albegosu
    labels:
      - dependencies
      - monorepo
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    ignore:
      - dependency-name: '*'

  # Docker images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - albegosu
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: '*'
