name: Deploy to Production

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /opt/from-zero-rag
            
            # Pull published images; `app` is build-based (see docker-compose.yml), so it is rebuilt via up --build below
            docker compose pull postgres ollama || true
            
            # Update env if needed
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Restart services
            docker compose --profile full up -d --build --remove-orphans
            
            # Migrations run on app startup via docker-entrypoint.sh; rerun is idempotent if needed:
            docker compose exec -T app npx prisma migrate deploy
            
            # Cleanup unused Docker data (avoid --volumes: can delete named volumes)
            docker system prune -af
            
            echo "✅ Deployment complete"
          EOF

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 fragua deployed to ${{ github.event.inputs.environment || 'production' }}: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
