name: CI - Test Learning

on:
  push:
    branches: [main]
    paths:
      - 'utils/learning/**'
      - 'pages/learn/**'
      - 'components/learn/**'
      - 'stores/progress.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test-learning.yml'
  pull_request:
    branches: [main]
    paths:
      - 'utils/learning/**'
      - 'pages/learn/**'
      - 'components/learn/**'
      - 'stores/progress.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test-learning.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec vue-tsc --noEmit

      - name: Run unit tests
        run: pnpm test

      - name: Build (learning routes smoke)
        run: pnpm build
