name: CI - Test Frontend

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - 'components/**'
      - 'layouts/**'
      - 'stores/**'
      - 'assets/**'
      - 'plugins/**'
      - 'composables/**'
      - 'i18n/**'
      - 'app.vue'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pages/**'
      - 'components/**'
      - 'layouts/**'
      - 'stores/**'
      - 'assets/**'
      - 'plugins/**'
      - 'composables/**'
      - 'i18n/**'
      - 'app.vue'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test-frontend.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: ci-test-secret-minimum-32-characters-long
      GOOGLE_API_KEY: ci-placeholder-key
      SKIP_ENV_VALIDATION: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec vue-tsc --noEmit

      - name: Run unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
