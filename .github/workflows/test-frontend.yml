name: CI - Test Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - 'pages/**'
      - 'components/**'
      - 'layouts/**'
      - 'stores/**'
      - 'assets/**'
      - 'plugins/**'
      - 'composables/**'
      - 'i18n/**'
      - 'app.vue'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test-frontend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'pages/**'
      - 'components/**'
      - 'layouts/**'
      - 'stores/**'
      - 'assets/**'
      - 'plugins/**'
      - 'composables/**'
      - 'i18n/**'
      - 'app.vue'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
