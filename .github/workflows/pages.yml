# GitHub Pages: VitePress guides only (`docs/`). The Nuxt app is built/published via docker-build.yml.
name: Deploy guides to Pages

on:
  push:
    branches: ['main']
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VitePress (docs)
        env:
          VITEPRESS_BASE: ${{ steps.pages.outputs.base_path }}/
          # Optional: override hosted Nuxt app URL for nav + social icon (default in docs/.vitepress/demo-app-url.ts).
          VITEPRESS_DEMO_URL: ${{ vars.VITEPRESS_DEMO_URL }}
        run: pnpm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
