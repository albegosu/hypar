# Deploy static Nuxt output to GitHub Pages (nuxt generate → .output/public).
# Pages only serves static files: server API routes and DB-backed features will not work on the hosted site.
# Full app: use Docker/SSH deploy (see deploy.yml).
name: Deploy Nuxt site to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # No .env in CI; Nitro prerender still loads Prisma. Placeholder is enough (no DB queries during generate).
      DATABASE_URL: postgresql://pages:pages@127.0.0.1:5432/pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      # Do not use static_site_generator: nuxt — it writes Nuxt 2-only keys into nuxt.config.js and breaks Nuxt 3 + nuxt.config.ts.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static export (Nuxt generate)
        env:
          # Project Pages URL is /repo-name/; empty base_path = site served at domain root.
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}/
        run: pnpm run generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
