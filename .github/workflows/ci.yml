name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      learning: ${{ steps.changes.outputs.learning }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'server/**'
              - 'prisma/**'
              - 'init-scripts/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/**'
            frontend:
              - 'pages/**'
              - 'components/**'
              - 'layouts/**'
              - 'stores/**'
              - 'assets/**'
              - 'plugins/**'
              - 'composables/**'
              - 'i18n/**'
              - 'app.vue'
              - 'nuxt.config.ts'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/**'
            learning:
              - 'utils/learning/**'
              - 'pages/learn/**'
              - 'components/learn/**'
              - 'stores/progress.ts'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/**'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/test-backend.yml

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/test-frontend.yml

  learning:
    needs: changes
    if: ${{ needs.changes.outputs.learning == 'true' }}
    uses: ./.github/workflows/test-learning.yml

  # Security scan job kept but skipped; set `if` to always() && (...) and uncomment triggers in security.yml to re-enable.
  security:
    needs: [backend, frontend, learning]
    if: false
    uses: ./.github/workflows/security.yml

  docker:
    needs: [backend, frontend, learning]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
