version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: ankane/pgvector:latest
    container_name: pkm-postgres
    environment:
      POSTGRES_USER: pkm_user
      POSTGRES_PASSWORD: pkm_password
      POSTGRES_DB: pkm_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkm_user -d pkm_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pkm-network

  # Ollama for local LLM and embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: pkm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pkm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RAG API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pkm-api
    environment:
      DATABASE_URL: postgresql://pkm_user:pkm_password@postgres:5432/pkm_rag?schema=public
      OLLAMA_URL: http://ollama:11434
      FRONTEND_URL: http://localhost:3000
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - pkm-network
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:

networks:
  pkm-network:
    driver: bridge
