<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>hypar demo frame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 675px;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      background: #0a0e0d;
      color: #d1fae5;
      padding: 28px 32px;
      overflow: hidden;
    }
    .panel {
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.4);
      margin-bottom: 16px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(52, 211, 153, 0.15);
      font-size: 11px;
      color: rgba(167, 243, 208, 0.5);
    }
    .accent { color: #34d399; }
    .panel-body { padding: 14px 16px; }
    .title { font-size: 16px; font-weight: 600; color: #a7f3d0; }
    .subtitle { font-size: 11px; color: rgba(167, 243, 208, 0.7); margin-top: 4px; }
    .messages { display: flex; flex-direction: column; gap: 12px; padding: 4px 2px; flex: 1; }
    .row { display: flex; }
    .row.user { justify-content: flex-end; }
    .row.agent { justify-content: flex-start; }
    .bubble {
      max-width: 82%;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
    }
    .bubble-user {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #a7f3d0;
    }
    .bubble-assistant {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(52, 211, 153, 0.15);
      color: #d1fae5;
    }
    .meta {
      font-size: 10px;
      color: rgba(167, 243, 208, 0.3);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pill {
      display: inline-flex;
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid rgba(52, 211, 153, 0.3);
      background: rgba(52, 211, 153, 0.1);
      color: #34d399;
      font-size: 9px;
    }
    .sources {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(52, 211, 153, 0.15);
      font-size: 11px;
      color: rgba(167, 243, 208, 0.5);
    }
    .sources a { color: #34d399; text-decoration: none; }
    .cite { color: #34d399; font-weight: 600; }
    .input-bar {
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 6px;
      background: #000;
      padding: 12px 14px;
      font-size: 12px;
      color: rgba(167, 243, 208, 0.5);
      margin-top: 12px;
    }
    .wrap { display: flex; flex-direction: column; height: 100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <motion-capture class="panel-header">
